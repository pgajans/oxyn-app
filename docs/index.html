<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxyn - Telefonuna Nefes Aldır</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0E1A;
            color: #C8CDD5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 480px;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #00E5FF, #00B8D4);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        h1 {
            color: #FFFFFF;
            font-size: 32px;
            margin-bottom: 8px;
        }
        .tagline {
            color: #8892A0;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .links a {
            display: block;
            padding: 16px 24px;
            background: #141B2D;
            border: 1px solid #1C2438;
            border-radius: 12px;
            color: #00E5FF;
            text-decoration: none;
            font-size: 15px;
            transition: background 0.2s;
        }
        .links a:hover {
            background: #1C2438;
        }
        .footer {
            margin-top: 48px;
            color: #5A6270;
            font-size: 13px;
        }
        .footer a { color: #00E5FF; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚡</div>
        <h1>Oxyn</h1>
        <p class="tagline">Telefonuna Nefes Aldır</p>
        <div class="links">
            <a href="privacy.html">Gizlilik Politikası</a>
            <a href="terms.html">Kullanım Şartları</a>
        </div>
        <div class="footer">
            <p>&copy; 2026 Oxyn. Tüm hakları saklıdır.</p>
            <p style="margin-top: 8px;">İletişim: <a href="mailto:oxynapp@gmail.com">oxynapp@gmail.com</a></p>
        </div>
    </div>
</body>
</html>
